<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus - Yapay Zeka Dünyası</title>
    <!-- style.css dosyamızı buraya bağlıyoruz -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>AI CORE v1.0</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                Merhaba! Kodlarımızı başarıyla ayırdık. Tasarım (CSS) ve Mantık (JS) artık kendi dosyalarında çalışıyor!
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Yapay zekaya bir şeyler yazın..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Gönder</button>
        </div>
    </div>

    <!-- script.js dosyamızı sayfa yükünün en altına bağlıyoruz -->
    <script src="script.js"></script>
</body>
</html>
